@if (chatbots().length) {
    <table
      mat-table
      [dataSource]="chatbots()"
      class="mat-elevation-z1 chatbot-table"
    >
      <!-- Name column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>
          Name
        </th>
        <td mat-cell *matCellDef="let bot">
          <a (click)="openChat(bot.id)" class="link">
            {{ bot.name }}
        </a>
        </td>
      </ng-container>
      <!-- Personality column -->
      <ng-container matColumnDef="personality">
        <th mat-header-cell *matHeaderCellDef>
          Personality
        </th>
        <td mat-cell *matCellDef="let bot">
          {{ bot.personality | number: '1.1-1' }}
        </td>
      </ng-container>
      <!-- Files column -->
      <ng-container matColumnDef="files">
        <th mat-header-cell *matHeaderCellDef>
          Files
        </th>
        <td mat-cell *matCellDef="let bot">
          {{ bot.knowledgeBaseFiles.length }}
        </td>
      </ng-container>
      <!-- Actions column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>
          Actions
        </th>
        <td mat-cell *matCellDef="let bot">
          <button
            mat-icon-button
            matTooltip="Edit"
            (click)="openEditDialog(bot.id); $event.stopPropagation()"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            matTooltip="Delete"
            (click)="delete(bot.id, $event)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  } @else {
    <p class="text">
      No chatbots yet. Click “Add chatbot” to create one.
    </p>
  }
